    <style>
        /* تصفير الهوامش وتظبيط الشاشة بالكامل */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        /* تنسيق شريط القائمة العلوي - شفاف بالكامل لكن غير متداخل مع الفيديو */
        .aplr-menu {
            list-style: none;
            margin: 0;
            padding: 10px;
            background: transparent !important;
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 8px;
            align-items: center;
            border-bottom: none !important;
            box-shadow: none !important;
            z-index: 100000;
            transition: all 0.3s ease;
        }

        .aplr-menu > * { flex-shrink: 0; }
        .aplr-menu::-webkit-scrollbar { height: 6px; }
        .aplr-menu::-webkit-scrollbar-thumb { background: rgba(85, 85, 85, 0.7); border-radius: 5px; }
        .aplr-menu li { display: inline-block; }

        /* تنسيق عام للزراير */
        button, select, input, textarea {
            cursor: pointer;
            padding: 8px 12px;
            border: 1px solid transparent;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            background: transparent;
            transition: all 0.3s ease;
        }
        
        select option { background: #222; color: #fff; }
        input { background: #222; color: #fff; border: 1px solid #555; cursor: text; }

        .btn { background: #333; border: 1px solid; padding: 8px 12px; }
        .btn-outline { background: transparent; border: 1px solid #fff; color: #fff; }

        .zoom-wrapper { display: flex; gap: 5px; align-items: center; }
        .zoom-wrapper button { border: 1px solid #fff; }

        .admin-only { display: none !important; }

        .dashboard {
            background-color: #1e272e;
            padding: 15px;
            border-bottom: 2px solid #444;
            font-size: 14px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 100001;
        }

        .dashboard .row {
            display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
            margin-bottom: 12px; background: rgba(47, 53, 66, 0.8);
            padding: 10px; border-radius: 8px;
        }

        .top-close-bar {
            display: flex; flex-wrap: wrap; justify-content: space-between;
            align-items: center; margin-bottom: 15px; background: rgba(47, 54, 64, 0.8);
            padding: 10px; border-radius: 8px;
        }

        .status-badge { background: #222; padding: 5px 15px; border-radius: 20px; border: 1px solid #555; }
        .btn-danger { border-color: #e74c3c !important; color: #e74c3c !important; }

        #player-area {
            flex-grow: 1; background-color: #000; color: #555;
            position: relative; width: 100%; height: 100%;
        }

        .grid-1 { display: block; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; width: 100%; height: 100%; gap: 2px; background: #222; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; width: 100%; height: 100%; gap: 2px; background: #222; }
        
        .screen-container { 
            width: 100%; height: 100%; position: relative; border: 3px solid transparent; 
            box-sizing: border-box; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; background: #000; overflow: hidden; cursor: pointer;
        }
        .screen-container.active { border-color: #f1c40f; z-index: 10; box-shadow: 0 0 10px #f1c40f inset; }

        /* كود التدوير وإخفاء الشرائط الفولاذي */
        body.zen-mode .aplr-menu, body.zen-mode .dashboard { display: none !important; }
        
        body.rotated #player-area {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vh !important;
            height: 100vw !important;
            transform-origin: top left !important;
            transform: rotate(90deg) translateY(-100%) !important;
            z-index: 99999 !important;
            background: #000;
        }
        body.rotated .aplr-menu, body.rotated .dashboard { display: none !important; }

        /* تنسيقات السحب والتحريك والتحديد والتمييز */
        .aplr-link.dragging { opacity: 0.5; transform: scale(0.95); border: 2px dashed #f1c40f; }
        .aplr-link.drag-over { border: 2px solid #2ecc71 !important; transform: scale(1.05); }
        .aplr-link.selected-item { border: 2px dashed #3498db !important; box-shadow: 0 0 10px #3498db; opacity: 0.9; }
        
        /* التمييز الجديد للقناة الشغالة */
        .aplr-link.playing-item { 
            border: 2px solid #2ecc71 !important; 
            box-shadow: 0 0 15px #2ecc71 !important; 
            background: #27ae60 !important; 
            color: #fff !important; 
            transform: scale(1.05); 
            font-weight: bold; 
        }

        /* ستايلات النوافذ (المودال) المخصصة - مع تفعيل السكرول */
        #custom-edit-modal, #multi-manage-modal, #bulk-add-overlay, #html-paste-overlay, #firebase-edit-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 100000; justify-content: center; align-items: center; 
            backdrop-filter: blur(5px); 
        }
        .edit-modal-content { 
            background: #1e272e; padding: 25px; border-radius: 12px; border: 2px solid #f1c40f; 
            width: 90%; max-width: 450px; max-height: 85vh; overflow-y: auto; color: white; display: flex; flex-direction: column; gap: 15px; 
            box-shadow: 0 0 25px rgba(0,0,0,0.7); 
        }
        .edit-modal-content::-webkit-scrollbar { width: 8px; }
        .edit-modal-content::-webkit-scrollbar-thumb { background: #555; border-radius: 5px; }
        .edit-modal-content h3 { margin: 0; text-align: center; color: #f1c40f; font-size: 20px; }
        .edit-modal-content label { font-size: 14px; font-weight: bold; color: #aaa; margin-bottom: 5px; display: block; }
        .edit-modal-content input, .edit-modal-content select { 
            width: 100%; padding: 12px; box-sizing: border-box; background: #111; 
            border: 1px solid #555; color: white; border-radius: 5px; font-size: 14px; 
        }
        .edit-modal-content input:focus, .edit-modal-content select:focus { outline: none; border-color: #3498db; }
        .edit-modal-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; margin-top: 15px; }
        .edit-modal-actions button { flex: 1 1 45%; padding: 12px; font-weight: bold; border-radius: 8px; font-size: 15px; }

        /* منع تحديد النص للزراير لتجنب اللون الأزرق عند النقر السريع */
        .aplr-menu button, 
        .aplr-menu .aplr-link, 
        .dashboard button {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        /* سكرول بار خاص للنافذة الجديدة بتاعت سحب الاطارات */
        #deep-scan-list::-webkit-scrollbar { width: 8px; }
        #deep-scan-list::-webkit-scrollbar-thumb { background: #555; border-radius: 5px; }
    </style>

    <script>
        let savedFbConfig = localStorage.getItem('customFirebaseConfig');
        if (savedFbConfig) {
            try {
                window.firebaseConfig = JSON.parse(savedFbConfig);
                let fbScript = document.getElementById('firebase-config-script');
                if(fbScript) {
                    fbScript.textContent = "window.firebaseConfig = " + JSON.stringify(window.firebaseConfig, null, 4) + ";";
                }
            } catch(e) {}
        }

        if (!firebase.apps.length) {
            firebase.initializeApp(window.firebaseConfig);
        }
        window.db = firebase.database();

        window.openFirebaseModal = function() {
            document.getElementById('firebase-config-box').value = JSON.stringify(window.firebaseConfig, null, 4);
            document.getElementById('firebase-edit-modal').style.display = 'flex';
        };

        window.saveFirebaseModal = function() {
            try {
                let newConfig = JSON.parse(document.getElementById('firebase-config-box').value);
                localStorage.setItem('customFirebaseConfig', JSON.stringify(newConfig));
                
                let fbScript = document.getElementById('firebase-config-script');
                if(fbScript) fbScript.textContent = "window.firebaseConfig = " + JSON.stringify(newConfig, null, 4) + ";";
                
                alert("تم تحديث سيرفر فايربيس بنجاح! سيتم إعادة تحميل الصفحة لتطبيق التغييرات.\n\nملاحظة: لضمان حفظ السيرفر للأبد كملف، اضغط على 'تحميل كـ HTML' بعد إعادة التحميل.");

        window.normalizeFolders = function(rawFolders) {
            let normalized = { "main": [] };
            try {
                if (!rawFolders) return normalized;
                if (Array.isArray(rawFolders)) {
                    normalized["main"] = rawFolders.filter(item => item && typeof item === 'object');
                } else if (typeof rawFolders === 'object') {
                    for (let key in rawFolders) {
                        if (Array.isArray(rawFolders[key])) {
                            normalized[key] = rawFolders[key].filter(item => item && typeof item === 'object');
                        } else if (typeof rawFolders[key] === 'object' && rawFolders[key] !== null) {
                            normalized[key] = Object.values(rawFolders[key]).filter(item => item && typeof item === 'object');
                        } else { normalized[key] = []; }
                    }
                }
                if (!normalized["main"]) normalized["main"] = [];
                for (let key in normalized) {
                    normalized[key].forEach(item => {
                        if (!item.type) item.type = 'channel';
                        if (!item.name) item.name = 'قناة بدون اسم';
                        if (!item.link && item.type === 'channel') item.link = '#';
                        if (item.type === 'channel' && !item.playMode) item.playMode = 'internal'; 
                    });
                }
            } catch(e) { console.error("Error formatting data:", e); }
            return normalized;
        };

                window.isDataFetched = true;

                let hasValidFolders = false;
                
                if (data) {
                    if(data.settings) {
                        window.playerSettings = data.settings;
                        if(window.applySettingsToUI) window.applySettingsToUI();
                    }
                    if (data.folders && typeof data.folders === 'object' && Object.keys(data.folders).length > 0) {
                        window.folderState.folders = window.normalizeFolders(data.folders);
                        hasValidFolders = true;
                    } else if (data.main || (Array.isArray(data) && data.length > 0)) {
                        window.folderState.folders = window.normalizeFolders(data);
                        hasValidFolders = true;
                    }
                }
                if (!hasValidFolders) {
                    window.db.ref('playerData/').once('value').then((snap2) => {
                        if(snap2.exists()) {
                            window.folderState.folders = window.normalizeFolders(snap2.val());

        window.robustFetchHTML = async function(urlToFetch) {
            let encodedUrl = encodeURIComponent(urlToFetch);
            let proxies = [
                'https://api.allorigins.win/get?url=' + encodedUrl, 
                'https://api.codetabs.com/v1/proxy?quest=' + encodedUrl,
                'https://corsproxy.io/?' + encodedUrl,
                'https://thingproxy.freeboard.io/fetch/' + urlToFetch
            ];
            
            let html = null;
            for (let p of proxies) {
                try {
                    let response = await fetch(p);
                    if (response.ok) {
                        let text = await response.text();
                        if (p.includes('allorigins')) {
                            try { html = JSON.parse(text).contents; } catch(e) { html = text; }
                        } else {
                            html = text;
                        }
                        if (html && html.length > 50) return html;
                    }
                } catch(e) { 
                    console.log("Proxy failed: " + p); 
                }
            }
            throw new Error("All proxies failed or blocked");
        };

        // =========================================================================
        // الدبابة الشاملة للفحص العميق - الكود الجديد كما طلبت
        // =========================================================================
        window.fetchCurrentIframe = async function() {
            let url = window.currentPlayingUrl;
            
            if (!url || url.trim() === "") {
                url = prompt("مفيش قناة شغالة حالياً.. دخل رابط الموقع اللي عايز تسحب منه الإطارات (Deep Scan):");
                if (!url) return;
            }

            let btn = document.querySelector('button[onclick="window.fetchCurrentIframe()"]');
            let origText = btn ? btn.innerText : "🔗 جلب Iframe";
            if(btn) btn.innerText = "⏳ جاري الفحص العنيف...";

            if (!url.startsWith('http')) url = 'https://' + url;

            let extracted = [];
            let uniqueLinks = new Set();

            function addLink(link, namePrefix) {
                if (!link || typeof link !== 'string') return;
                let src = link.replace(/\\/g, '').trim();

                if (src.startsWith('//')) src = 'https:' + src;
                else if (src.startsWith('/')) { try { src = new URL(src, url).href; } catch(e){} }

                if (!src.startsWith('http')) return;

                let lower = src.toLowerCase();
                // فلترة الروابط اللي ملهاش لازمة (صور، ستايلات، إحصائيات)
                if (lower.includes('wp-json') || lower.includes('wp-content') ||
                    lower.match(/\.(png|jpg|jpeg|gif|css|js|woff|svg|ico)$/i) ||
                    lower.includes('google-analytics') || lower.includes('facebook') || lower.includes('twitter')) {
                    return;
                }

                if (!uniqueLinks.has(src)) {
                    uniqueLinks.add(src);
                    let isMain = src === url;
                    let finalName = isMain ? "الأساسي" : namePrefix + " " + extracted.length;
                    extracted.push({ name: finalName, link: src });
                }
            }

            addLink(url, "الأساسي");

            if (url.toLowerCase().includes('.m3u8') || url.toLowerCase().includes('.mp4')) {
                window.showDeepScanModal(extracted);
                if(btn) btn.innerText = origText;
                return;
            }

            try {
                let response;
                try { response = await fetch('https://corsproxy.io/?' + encodeURIComponent(url)); if (!response.ok) throw new Error("Fallback"); }
                catch (e1) {
                    try { response = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url)); if (!response.ok) throw new Error("Fallback"); }
                    catch (e2) { response = await fetch('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url)); if(!response.ok) throw new Error("All proxies failed"); }
                }

                let html = await response.text();
                let parser = new DOMParser();
                let doc = parser.parseFromString(html, 'text/html');

                function addExtractedLink(src) {
                    if (src && src.trim() !== '' && src !== 'about:blank' && !src.startsWith('javascript:')) {
                        src = src.replace(/\\/g, ''); 
                        if (src.startsWith('//')) src = 'https:' + src;
                        else if (src.startsWith('/')) { let u = new URL(url); src = u.origin + src; }
                        
                        if (!uniqueLinks.has(src)) {
                            uniqueLinks.add(src);
                            extracted.push({ name: "إطار " + extracted.length, link: src });
                        }
                    }
                }

                // 1. الإطارات الصريحة
                let iframes = doc.querySelectorAll('iframe');
                iframes.forEach((ifr) => addExtractedLink(ifr.getAttribute('src')));

                // 2. الروابط المخفية في السكريبتات
                let iframeRegex = /<iframe[^>]+src=\\?["']([^"'>\\]+)\\?["']/gi;
                let match;
                while ((match = iframeRegex.exec(html)) !== null) {
                    addExtractedLink(match[1]);
                }

                // 3. فحص إضافي عن أي رابط بينتهي بـ m3u8 أو php جوه الكود
                let linkRegex = /(https?:\/\/[^\s"'<>]+?(?:m3u8|php|embed)[^\s"'<>]*)/gi;
                while ((match = linkRegex.exec(html)) !== null) {
                    addExtractedLink(match[1]);
                }

            } catch(e) {
                console.error("Deep Scan Failed:", e);
                alert("⚠️ حماية الموقع قوية جداً.\n\nسيتم عرض ما تم استخراجه فقط.");
            } finally {
                window.showDeepScanModal(extracted);
                if(btn) btn.innerText = origText;
            }
        };

        // دالة إنشاء وعرض نافذة النتائج الجديدة

        window.processHTMLPaste = function() {
            let inputHTML = document.getElementById("html-paste-box").value;

            let parser = new DOMParser();
            let doc = parser.parseFromString(inputHTML, 'text/html');
            let links = doc.querySelectorAll('a');
            let extractedChannels = [];
            
            links.forEach(a => {
                let href = a.getAttribute('href');
                let name = a.innerText.trim() || a.textContent.trim();
                if (!name) {
                    let img = a.querySelector('img');
                    if (img) name = img.getAttribute('alt') || img.getAttribute('title');
                }
                if (!name) name = "قناة مستخرجة";

                if (href && href !== "#" && !href.startsWith("javascript:")) {
                    extractedChannels.push({ type: "channel", name: name, link: href, playMode: "internal" });
                }
            });

            if (extractedChannels.length > 0) {
                let currentFolder = window.folderState.currentFolderId;
                if(!window.folderState.folders[currentFolder]) window.folderState.folders[currentFolder] = [];
                window.folderState.folders[currentFolder].unshift(...extractedChannels);
                window.renderCurrentFolder();
                window.autoSave();
                alert("تم استخراج وإضافة " + extractedChannels.length + " قناة بنجاح!");

        window.processBulkPaste = function() {
            let input = document.getElementById("bulk-paste-box").value;
            let pos = document.getElementById("bulk-position").value;
            if(!input || !input.trim()) { alert("لم تقم بإدخال أي قنوات!"); return; }

            let targetFolderId = window.folderState.currentFolderId;
            if(!window.folderState.folders[targetFolderId]) window.folderState.folders[targetFolderId] = [];
            let arr = window.folderState.folders[targetFolderId];
            
            let newChannels = [];
            let lines = input.split('\n');
            lines.forEach((l, index) => {
                let text = l.trim();
                if(text) {
                    if(text.includes(',')) {
                        let parts = text.split(',');
                        newChannels.push({ type: "channel", name: parts[0].trim(), link: parts.slice(1).join(',').trim(), playMode: "internal" });
                    } else if (text.startsWith('http')) {
                        newChannels.push({ type: "channel", name: "قناة " + (index + 1), link: text, playMode: "internal" });
                    }
                }
            });

            if(newChannels.length > 0) {
                if(pos === "2") { arr.push(...newChannels); } 
                else {
                    let firstFolderIdx = arr.findIndex(x => x.type === 'folder');
                    if(firstFolderIdx === -1) arr.unshift(...newChannels);
                    else arr.splice(firstFolderIdx, 0, ...newChannels);
                }
                window.renderCurrentFolder();
                window.autoSave();
                alert("تم إضافة " + newChannels.length + " قناة بنجاح للفولدر الحالي!");
            } else { alert("لم يتم العثور على صيغة صحيحة!"); }
            document.getElementById("bulk-add-overlay").remove();
        };

        window.generateM3UString = function(itemsArray) {
            let m3u = "#EXTM3U\n";
            function extract(items, path) {
                items.forEach(item => {
                    if(item.type === 'folder') {
                        extract(window.folderState.folders[item.id] || [], path ? path + " / " + item.name : item.name);
                    } else {
                        m3u += `#EXTINF:-1 group-title="${path || 'المقاطع المحددة'}",${item.name}\n${item.link}\n`;
                    }
                });
            }
            extract(itemsArray, "");
            return m3u;
        };

        window.generateLinksString = function(itemsArray) {
            let links = "";
            function extract(items) {
                items.forEach(item => {
                    if(item.type === 'folder') {
                        extract(window.folderState.folders[item.id] || []);
                    } else { links += `${item.link}\n`; }
                });
            }
            extract(itemsArray);
            return links.trim();
        };

        window.setActiveScreen = function(num) {
            window.activeScreen = num;
            document.querySelectorAll('.screen-container').forEach(el => el.classList.remove('active'));
            let activeEl = document.getElementById('screen-' + num);
            if(activeEl) activeEl.classList.add('active');
        };

        window.toggleSplitScreen = function() {
            window.splitMode = window.splitMode === 1 ? 2 : (window.splitMode === 2 ? 4 : 1);
            window.renderScreens();
        };

        window.mediaRecorder = null;
        window.recordedChunks = [];
        window.toggleRecording = async function() {
            let btn = document.getElementById('record-btn');
            if (window.mediaRecorder && window.mediaRecorder.state === "recording") {
                window.mediaRecorder.stop();
                btn.innerText = "🔴 تسجيل"; btn.style.background = "#c0392b";
                return;
            }
            if (!navigator.mediaDevices || typeof navigator.mediaDevices.getDisplayMedia === 'undefined') {
                alert("عفواً، متصفحك يمنع تسجيل الشاشة كإجراء أمني للروابط المحلية."); return;
            }
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                window.mediaRecorder = new MediaRecorder(stream);
                window.mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) window.recordedChunks.push(e.data); };
                window.mediaRecorder.onstop = function() {
                    const blob = new Blob(window.recordedChunks, { type: "video/webm" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url; a.download = "recording_" + Date.now() + ".webm";
                    a.click(); URL.revokeObjectURL(url);
                    window.recordedChunks = [];
                };
                window.mediaRecorder.start();
                btn.innerText = "⏹ إيقاف التسجيل"; btn.style.background = "#f39c12";
                stream.getVideoTracks()[0].onended = function () {
                    if(window.mediaRecorder.state === "recording") window.mediaRecorder.stop();
                    btn.innerText = "🔴 تسجيل"; btn.style.background = "#c0392b";
                };
            } catch (err) { alert("تم إلغاء التسجيل."); }
        };

        document.addEventListener('contextmenu', e => { if(window.prot.inspect) e.preventDefault(); });
        document.addEventListener('keydown', e => {
            if(window.prot.inspect) {
                if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
                    e.preventDefault();
                }
            }
            if(e.key === 'ArrowRight') { window.prevChannel(); }
            if(e.key === 'ArrowLeft') { window.nextChannel(); }
            if(e.key.toLowerCase() === 'f') { window.openPlayerFullscreen(); }
            if(e.key === 'Escape') { 
                document.body.classList.remove("zen-mode"); 
                document.body.classList.remove("rotated");
                window.dispatchEvent(new Event('resize'));
            } 
            if(e.key.toLowerCase() === 'm') { 
                let targetScreen = window.activeScreen || 1;
                let vid = document.getElementById('video-player-' + targetScreen);
                if(vid) vid.muted = !vid.muted; 
            }
        });

        window.filterChannels = function() {
            let val = document.getElementById("search-bar").value.toLowerCase();
            let btns = document.getElementById("dynamic-channels-list").querySelectorAll("button.aplr-link");
            btns.forEach(btn => {
                if (btn.innerText.includes("🔙") || btn.innerText === "☰" || btn.innerText === "Dashboard") return;
                if (btn.innerText.toLowerCase().includes(val)) btn.style.display = "inline-block";
                else btn.style.display = "none";
            });
        };

        window.toggleMenuList = function() {
            let extraMenu = document.getElementById('extra-menu-items');
            if (extraMenu) {
                extraMenu.style.display = (extraMenu.style.display === 'none' || extraMenu.style.display === '') ? 'flex' : 'none';
            }
        };

        window.applyTheme = function(theme) {
            let menu = document.querySelector('.aplr-menu');
            let dash = document.querySelector('.dashboard');
            if (menu) { menu.style.background = 'transparent'; menu.style.backgroundColor = 'transparent'; }

            if(theme === 'bein') { dash.style.background = '#240046'; }
            else if(theme === 'ssc') { dash.style.background = '#004d00'; }
            else if(theme === 'sky') { dash.style.background = '#074c83'; }
            else if(theme === 'madrid') { dash.style.background = '#dfe4ea'; }
            else if(theme === 'barca') { dash.style.background = '#2980b9'; }
            else if(theme === 'dark-gold') { dash.style.background = '#1a1a1a'; }
            else { dash.style.background = '#1e272e'; } 
        };

        window.generateIframe = function(url, screenNum = null) {
            window.currentPlayingUrl = url;
            let engine = document.getElementById("player-engine-selector").value;
            let overlayStyle = window.prot.overlay ? 'block' : 'none';
            let targetScreen = screenNum || window.activeScreen || 1;
            let container = document.getElementById("screen-" + targetScreen);
            
            if(!container) container = document.getElementById("player-area");

            if (url.includes('.m3u8') && (engine === 'hlsjs' || engine === 'native')) {
                container.innerHTML = `<video id="video-player-${targetScreen}" controls autoplay style="width:100%; height:100%; object-fit:contain;"></video><div id="player-overlay-${targetScreen}" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:10; display:${overlayStyle};"></div>`;
                let video = document.getElementById('video-player-' + targetScreen);
                if (Hls.isSupported() && engine === 'hlsjs') {
                    let hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url; video.play();
                } else { alert("متصفحك لا يدعم تشغيل الروابط الخام مباشرة."); }
            } else {
                let sandboxAttr = "";
                if(window.superBlockerEnabled) {
                    sandboxAttr = 'sandbox="allow-scripts allow-same-origin"'; 
                } else {
                    sandboxAttr = window.prot.sandbox ? 'sandbox="allow-scripts allow-same-origin ' + (window.prot.popups ? 'allow-popups allow-popups-to-escape-sandbox' : '') + '"' : '';
                }
                container.innerHTML = `<iframe src="${url}" width="100%" height="100%" frameborder="0" allowfullscreen ${sandboxAttr}></iframe><div id="player-overlay-${targetScreen}" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:10; background:transparent; display:${overlayStyle};"></div>`;
            }
        };

        window.closePlayerScreen = function() {
            let targetScreen = window.activeScreen || 1;
            let container = document.getElementById("screen-" + targetScreen);
            if(!container) container = document.getElementById("player-area");
            container.innerHTML = '<h2 style="color:#555; text-align:center; margin-top:20%;">الشاشة مغلقة</h2>';
            let statusBadge = document.getElementById("stream-status");
            if(statusBadge) statusBadge.innerText = "⚫ متوقف";
        };

        window.changeZoom = function(val) { window.currentZoom += val; document.getElementById("player-area").style.transform = `scale(${window.currentZoom})`; };
        window.resetZoom = function() { window.currentZoom = 1; document.getElementById("player-area").style.transform = `scale(1)`; };
        window.changeThemeSelect = function() { window.applyTheme(document.getElementById("theme-selector").value); };
        window.playDirectLink = function() { 
            let directLink = document.getElementById("direct-link-input").value;
            if(directLink) { window.generateIframe(directLink); } else { alert('يرجى إدخال الرابط أولاً!'); }
        };

        window.toggleStrictProtect = function() { window.prot.strict = !window.prot.strict; alert('الحماية القصوى ' + (window.prot.strict ? 'مفعلة' : 'معطلة')); };
        window.toggleOverlay = function() { window.prot.overlay = !window.prot.overlay; if(window.currentPlayingUrl) window.generateIframe(window.currentPlayingUrl); };
        window.toggleSandbox = function() { window.prot.sandbox = !window.prot.sandbox; if(window.currentPlayingUrl) window.generateIframe(window.currentPlayingUrl); };
        window.togglePopups = function() { window.prot.popups = !window.prot.popups; if(window.currentPlayingUrl) window.generateIframe(window.currentPlayingUrl); };
        window.toggleInspect = function() { window.prot.inspect = !window.prot.inspect; alert('منع الفحص ' + (window.prot.inspect ? 'مفعل' : 'معطل')); };
        
        window.toggleEditMode = function() { 
            window.isEditMode = !window.isEditMode; 
            let btn = document.getElementById('btn-modal-edit-mode');
            if(btn) {
                btn.style.background = window.isEditMode ? "#f1c40f" : "#111";
                btn.style.color = window.isEditMode ? "#111" : "#f1c40f";
            }
        };
        window.closeEditModal = function() { document.getElementById("custom-edit-modal").style.display = 'none'; };

        window.addEventListener('DOMContentLoaded', (event) => {
            window.syncDOMToState(); 
            window.renderCurrentFolder(); 

            if(window.setupPresence) window.setupPresence();
            if(window.doLoadFromFirebase) window.doLoadFromFirebase();
            if(window.renderScreens) window.renderScreens();
        });

    </script>
</body>
</html>
